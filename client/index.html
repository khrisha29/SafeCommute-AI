<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1D9E75" />
    
    <!-- SEO Best Practices -->
    <title>SafeCommute AI - Safest & Most Efficient Commuting Route Planner</title>
    <meta name="description" content="SafeCommute AI helps urban commuters in India choose the safest transit routes using AI-powered safety scoring, street lighting analysis, live transit, and real-time SOS features." />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Mapbox GL CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
  </head>
  <body class="h-full bg-darkBg text-gray-100 font-sans">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Register PWA Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('PWA Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
